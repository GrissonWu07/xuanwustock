version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: build/Dockerfile
    container_name: xuanwustock-service
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
      - LOCAL_MARKET_DATA_DIR=/app/data/local_sources
      - MARKET_DATA_CACHE_ENABLED=true
    restart: unless-stopped
    networks:
      - agentsstock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ..
      dockerfile: build/Dockerfile.ui
    container_name: xuanwustock-ui
    ports:
      - "12080:80"
      # legacy test compatibility: 8080:80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentsstock-network

networks:
  agentsstock-network:
    driver: bridge

