version: '3.8'

services:
  backend:
    image: ${IMAGE_NAME:-grissonwu07/xuanwustock}:${SERVICE_IMAGE_TAG:-latest}
    container_name: xuanwustock-service
    ports:
      - "8501:8501"
    volumes:
      - ${XUANWUSTOCK_DATA_DIR:-./data}:/app/data
    environment:
      - TZ=Asia/Shanghai
      - LOCAL_MARKET_DATA_DIR=/app/data/local_sources
      - MARKET_DATA_CACHE_ENABLED=true
      - STOCK_ANALYSIS_ASYNC_REFRESH_ENABLED=false
    restart: unless-stopped
    networks:
      - agentsstock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${IMAGE_NAME:-grissonwu07/xuanwustock}:${UI_IMAGE_TAG:-ui-latest}
    container_name: xuanwustock-ui
    ports:
      - "12080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentsstock-network

networks:
  agentsstock-network:
    driver: bridge
