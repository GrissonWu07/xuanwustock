version: '3.8'

services:
  backend:
    image: grissonwu07/xuanwustock:latest
    container_name: xuanwustock-service
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - agentsstock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: grissonwu07/xuanwustock:ui-latest
    container_name: xuanwustock-ui
    ports:
      - "12080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentsstock-network

networks:
  agentsstock-network:
    driver: bridge
