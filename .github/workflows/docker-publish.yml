name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: uhub.service.ucloud.cn
  IMAGE_NAME: uhub.service.ucloud.cn/xuanwu/xuanwustock
  DOCKER_CONFIG: /tmp/.docker-xuanwustock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"

      - name: Configure registry auth
        env:
          REGISTRY_USERNAME: ${{ secrets.UHUB_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.UHUB_PASSWORD }}
        run: |
          set -euo pipefail
          AUTH="$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {
            "auths": {
              "$REGISTRY": {
                "auth": "$AUTH"
              },
              "https://$REGISTRY": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push backend image
        run: |
          set -euo pipefail
          retry_push() {
            local image="$1"
            local max_attempts=5
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              if docker --config "$DOCKER_CONFIG" push "$image"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Push failed for $image after ${max_attempts} attempts"
                return 1
              fi
              local sleep_s=$((attempt * 5))
              echo "Push failed for $image (attempt ${attempt}/${max_attempts}), retrying in ${sleep_s}s..."
              sleep "$sleep_s"
              attempt=$((attempt + 1))
            done
          }
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("${IMAGE_NAME}:sha-${SHORT_SHA}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("${IMAGE_NAME}:latest")
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE_NAME}:${GITHUB_REF_NAME}")
          fi
          BUILD_TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done
          docker --config "$DOCKER_CONFIG" build -f build/Dockerfile $BUILD_TAG_ARGS .
          for tag in "${TAGS[@]}"; do
            retry_push "$tag"
          done

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          retry_push() {
            local image="$1"
            local max_attempts=5
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              if docker --config "$DOCKER_CONFIG" push "$image"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Push failed for $image after ${max_attempts} attempts"
                return 1
              fi
              local sleep_s=$((attempt * 5))
              echo "Push failed for $image (attempt ${attempt}/${max_attempts}), retrying in ${sleep_s}s..."
              sleep "$sleep_s"
              attempt=$((attempt + 1))
            done
          }
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("${IMAGE_NAME}:ui-sha-${SHORT_SHA}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("${IMAGE_NAME}:ui-latest")
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE_NAME}:ui-${GITHUB_REF_NAME}")
          fi
          BUILD_TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done
          docker --config "$DOCKER_CONFIG" build -f build/Dockerfile.ui $BUILD_TAG_ARGS .
          for tag in "${TAGS[@]}"; do
            retry_push "$tag"
          done

  deploy-on-mac:
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' && github.ref == 'refs/heads/main' }}
    runs-on:
      - self-hosted
      - macOS
      - xuanwustock
    env:
      APP_HOME: /Users/grisson.wu/app/xuanwustock
      DOCKER_CONFIG: /Users/grisson.wu/app/xuanwustock/.docker
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          set -euo pipefail
          mkdir -p "$APP_HOME"
          mkdir -p "$APP_HOME/data"
          mkdir -p "$APP_HOME/config"
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"

      - name: Prepare deploy compose under app home
        run: |
          set -euo pipefail
          cp build/docker-compose.deploy.yml "$APP_HOME/config/docker-compose.deploy.yml"

      - name: Configure registry auth
        env:
          REGISTRY_USERNAME: ${{ secrets.UHUB_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.UHUB_PASSWORD }}
        run: |
          set -euo pipefail
          AUTH="$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {
            "auths": {
              "$REGISTRY": {
                "auth": "$AUTH"
              },
              "https://$REGISTRY": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Pull and restart services
        run: |
          set -euo pipefail
          retry_pull() {
            local image="$1"
            local max_attempts=8
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              if docker --config "$DOCKER_CONFIG" pull "$image"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Pull failed for $image after ${max_attempts} attempts"
                return 1
              fi
              local sleep_s=$((attempt * 10))
              echo "Pull failed for $image (attempt ${attempt}/${max_attempts}), retrying in ${sleep_s}s..."
              sleep "$sleep_s"
              attempt=$((attempt + 1))
            done
          }
          SHORT_SHA="${GITHUB_SHA::7}"
          SERVICE_IMAGE_TAG="sha-${SHORT_SHA}"
          UI_IMAGE_TAG="ui-sha-${SHORT_SHA}"
          XUANWUSTOCK_DATA_DIR="$APP_HOME/data"
          export SERVICE_IMAGE_TAG UI_IMAGE_TAG XUANWUSTOCK_DATA_DIR
          retry_pull "${IMAGE_NAME}:${SERVICE_IMAGE_TAG}"
          retry_pull "${IMAGE_NAME}:${UI_IMAGE_TAG}"
          docker compose -f "$APP_HOME/config/docker-compose.deploy.yml" up -d --remove-orphans
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
