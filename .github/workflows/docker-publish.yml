name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: grissonwu07/xuanwustock
  DOCKER_CONFIG: /tmp/.docker-xuanwustock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"

      - name: Configure Docker Hub auth
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          AUTH="$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push backend image
        run: |
          set -euo pipefail
          retry_push() {
            local image="$1"
            local max_attempts=5
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              if docker --config "$DOCKER_CONFIG" push "$image"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Push failed for $image after ${max_attempts} attempts"
                return 1
              fi
              local sleep_s=$((attempt * 5))
              echo "Push failed for $image (attempt ${attempt}/${max_attempts}), retrying in ${sleep_s}s..."
              sleep "$sleep_s"
              attempt=$((attempt + 1))
            done
          }
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("${IMAGE_NAME}:sha-${SHORT_SHA}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("${IMAGE_NAME}:latest")
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE_NAME}:${GITHUB_REF_NAME}")
          fi
          BUILD_TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done
          docker --config "$DOCKER_CONFIG" build -f build/Dockerfile $BUILD_TAG_ARGS .
          for tag in "${TAGS[@]}"; do
            retry_push "$tag"
          done

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          retry_push() {
            local image="$1"
            local max_attempts=5
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              if docker --config "$DOCKER_CONFIG" push "$image"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Push failed for $image after ${max_attempts} attempts"
                return 1
              fi
              local sleep_s=$((attempt * 5))
              echo "Push failed for $image (attempt ${attempt}/${max_attempts}), retrying in ${sleep_s}s..."
              sleep "$sleep_s"
              attempt=$((attempt + 1))
            done
          }
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("${IMAGE_NAME}:ui-sha-${SHORT_SHA}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("${IMAGE_NAME}:ui-latest")
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE_NAME}:ui-${GITHUB_REF_NAME}")
          fi
          BUILD_TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done
          docker --config "$DOCKER_CONFIG" build -f build/Dockerfile.ui $BUILD_TAG_ARGS .
          for tag in "${TAGS[@]}"; do
            retry_push "$tag"
          done

      - name: Export deploy images
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          docker save "${IMAGE_NAME}:latest" -o service-image.tar
          docker save "${IMAGE_NAME}:ui-latest" -o ui-image.tar

      - name: Upload deploy images artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-images
          path: |
            service-image.tar
            ui-image.tar
          retention-days: 1

  deploy-on-mac:
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' && github.ref == 'refs/heads/main' }}
    runs-on:
      - self-hosted
      - macOS
      - xuanwustock
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"

      - name: Configure Docker Hub auth
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          AUTH="$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "$AUTH"
              }
              }
            }
          EOF

      - name: Download deploy images artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-images
          path: /tmp/xuanwustock-images

      - name: Load and restart services
        run: |
          set -euo pipefail
          docker load -i /tmp/xuanwustock-images/service-image.tar
          docker load -i /tmp/xuanwustock-images/ui-image.tar
          docker compose -f build/docker-compose.deploy.yml up -d --remove-orphans
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
